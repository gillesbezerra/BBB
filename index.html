<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Confessionário BBB</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-image: url('10884476.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    text-align: center;
    font-family: Arial, sans-serif;
    color: white;
}

/* Camada escura mais leve */
.overlay {
    background: rgba(0, 0, 0, 0.55);
    min-height: 100vh;
    padding-top: 40px;
}

/* Título estilo BBB */
h1 {
    font-size: 50px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #ff1e1e;
    text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
}

/* Caixa da enquete */
.enquete-box {
    width: 90%;
    max-width: 900px;
    margin: 40px auto;
    padding: 30px;
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid #ff0000;
    border-radius: 20px;
    box-shadow: 0 0 30px #ff0000;
    color: white;
}

/* Forçar texto da enquete a ficar branco */
.enquete-box * {
    color: white !important;
}

/* Melhorar visibilidade dos nomes */
.enquete-box img {
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="overlay">

<h1>🔥 CONFESSIONÁRIO 🔥</h1>

<div class="enquete-box">

<ce:enquete id="17386810"
question_size="5"
option_size="6"
img_option_size="5"
font="Roboto, sans-serif"
primary_color="#ff0000"
secondary_color="#ff0000"
height="1948">
</ce:enquete>

<script async type="text/javascript" src="https://www.criarenquete.com.br/user.js"></script>

</div>

</div>

</body>
</html>
